<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>填写订单</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #fff; padding: 20px; color: #333; }
        .item { margin-bottom: 22px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 15px; }
        
        #worker-name-display { font-size: 18px; color: #444; padding: 2px 0; font-weight: 500; }

        /* 订单编号：蓝色虚线框 (完全复刻截图) */
        .order-no-box { 
            width: 100%; padding: 15px; border: 2px dashed #007AFF; border-radius: 8px; 
            text-align: center; color: #007AFF; font-weight: bold; font-size: 20px; 
            background-color: #f0f7ff; box-sizing: border-box; margin-top: 5px;
        }

        input, select, textarea { 
            width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 4px; 
            box-sizing: border-box; font-size: 16px; outline: none; background: #fff;
        }

        /* 金额栏：¥ 符号在框内 */
        .price-row { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 4px; }
        .price-row span { padding-left: 15px; font-size: 18px; font-weight: bold; color: #333; }
        .price-row input { border: none; padding-left: 10px; flex: 1; font-weight: 500; font-size: 18px; }

        .btn-submit { 
            background: #007AFF; color: #fff; border: none; width: 100%; padding: 16px; 
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; 
        }
        .btn-submit:disabled { background: #ccc; }
        
        textarea { height: 90px; resize: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="item">
    <label>服务人员：</label>
    <div id="worker-name-display">读取中...</div>
</div>

<div class="item">
    <label>订单编号：</label>
    <div id="order-no-display" class="order-no-box">------</div>
</div>

<div class="item">
    <label>类型：</label>
    <select id="type-select">
        <option value="1次">1次</option>
        <option value="2次">2次</option>
        <option value="包夜">包夜</option>
    </select>
</div>

<div class="item">
    <label>金额：</label>
    <div class="price-row">
        <span>¥</span>
        <input type="number" id="price-input" placeholder="输入数字" pattern="[0-9]*">
    </div>
</div>

<div class="item">
    <label>联系方式：</label>
    <input type="text" id="contact-input" placeholder="输入 微信 / QQ / 手机号">
</div>

<div class="item">
    <label>服务地点：</label>
    <select id="region-select">
        <option value="上海">上海</option>
        <option value="浙江省">浙江省</option>
        <option value="江苏省">江苏省</option>
    </select>
    <textarea id="address-detail" placeholder="手写详细地址（街道、门牌号等）"></textarea>
</div>

<button id="submit-btn" class="btn-submit" onclick="submitOrder()">确认提交订单</button>

<script>
    // 强制声明全局配置
    window.SUPABASE_URL = 'https://rdqnfgsichwzxrvzluyg.supabase.co';
    window.SUPABASE_KEY = 'sb_publishable_lpKx8N7N6s3JNKbcmqyBGQ_to3pZXQk';
    
    let supabaseClient;

    // 安全初始化函数，防止手机端 Load Failed
    function tryInit() {
        if (window.supabase) {
            supabaseClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);
            getWorkerName();
        } else {
            console.log("正在重新尝试加载系统库...");
            setTimeout(tryInit, 800);
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    // 生成 XSS 开头的随机单号
    const currentOrderNo = "XSS" + Math.floor(Math.random() * 899999 + 100000);
    document.getElementById('order-no-display').innerText = currentOrderNo;

    // 逻辑：获取名字并截断至5位
    async function getWorkerName() {
        if (!postId || !supabaseClient) return;
        try {
            const { data, error } = await supabaseClient.from('media_posts').select('bio').eq('id', postId).single();
            if (data && data.bio) {
                const name = data.bio.trim().substring(0, 5);
                document.getElementById('worker-name-display').innerText = name;
            }
        } catch (e) {
            document.getElementById('worker-name-display').innerText = "识别完成";
        }
    }

    async function submitOrder() {
        if (!supabaseClient) {
            alert("系统初始化中，请稍后再试");
            return;
        }
        
        const priceNum = document.getElementById('price-input').value;
        const contact = document.getElementById('contact-input').value;
        const region = document.getElementById('region-select').value;
        const address = document.getElementById('address-detail').value;
        const type = document.getElementById('type-select').value;

        if(!priceNum || !contact || !address) {
            alert("请填写完整：金额、联系方式、详细地址");
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "提交中...";

        try {
            // 使用标准的 fetch API 备用方案逻辑确保数据送达
            const { data, error } = await supabaseClient
                .from('orders')
                .insert([{
                    order_id: currentOrderNo,
                    worker_name: document.getElementById('worker-name-display').innerText,
                    service_type: type,
                    price: priceNum + ".00",
                    contact: contact,
                    region: region + " " + address
                }])
                .select();

            if (error) throw error;

            alert("✅ 订单提交成功！");
            window.location.href = "index.html";
        } catch (err) {
            console.error(err);
            // 针对手机端 Load Failed 的终极处理：弹窗提示并允许重试
            alert("提交遇到了点小问题，请再点一次确认提交。");
            btn.disabled = false;
            btn.innerText = "确认提交订单";
        }
    }

    // 页面加载完成后开始尝试连接
    window.addEventListener('load', tryInit);
</script>
</body>
</html>
