<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提交订单</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #f4f4f4; padding: 15px; }
        .order-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .item { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-submit { background: #007AFF; color: #fff; border: none; width: 100%; padding: 16px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; }
        .worker-box { background: #f0f7ff; padding: 10px; border-radius: 8px; font-weight: bold; color: #007AFF; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="order-card">
    <div class="item">
        <label>服务人员：</label>
        <div id="worker-name-display" class="worker-box">正在读取数据...</div>
    </div>
    <div class="item">
        <label>联系方式：</label>
        <input type="text" id="contact-input" placeholder="微信 / 手机号">
    </div>
    <div class="item">
        <label>服务地点：</label>
        <select id="region-select">
            <option value="">点击选择</option>
            <option value="上海">上海</option>
            <option value="浙江">浙江</option>
            <option value="江苏">江苏</option>
        </select>
    </div>
    <button id="submit-btn" class="btn-submit" onclick="submitOrder()">确认提交订单</button>
</div>

<script>
    const SUPABASE_URL = 'https://rdqnfgsichwzxrvzluyg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lpKx8N7N6s3JNKbcmqyBGQ_to3pZXQk';
    
    let supabaseClient;

    // 关键改进：等待库加载完成后再初始化
    function initSupabase() {
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            getWorkerName();
        } else {
            // 如果没加载完，等0.5秒再试
            setTimeout(initSupabase, 500);
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');

    async function getWorkerName() {
        if (!postId || !supabaseClient) return;
        try {
            const { data } = await supabaseClient.from('media_posts').select('bio').eq('id', postId).single();
            if (data) {
                document.getElementById('worker-name-display').innerText = data.bio.split('\n')[0].substring(0, 15);
            }
        } catch (e) {
            console.log("获取名字失败");
        }
    }

    async function submitOrder() {
        if (!supabaseClient) return alert("系统正在初始化，请稍后");
        
        const contact = document.getElementById('contact-input').value;
        const region = document.getElementById('region-select').value;
        if(!contact || !region) return alert("请填写完整信息");

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "提交中...";

        try {
            const { error } = await supabaseClient.from('orders').insert([{
                order_id: "SN" + Date.now().toString().slice(-6),
                worker_name: document.getElementById('worker-name-display').innerText,
                contact: contact,
                region: region
            }]);

            if (error) throw error;
            alert("✅ 订单提交成功！");
            window.location.href = "index.html";
        } catch (err) {
            alert("提交失败：" + err.message);
            btn.disabled = false;
            btn.innerText = "重新提交";
        }
    }

    // 页面加载后启动初始化
    window.onload = initSupabase;
</script>
</body>
</html>
